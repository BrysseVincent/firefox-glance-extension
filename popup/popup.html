<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Glimpse</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <span class="logo">◐</span>
      <h1>Glimpse</h1>
    </header>

    <p class="hint">
      Hold <kbd>Alt</kbd> and click any link to open it in a floating preview
      instead of leaving the page.
    </p>

    <ul class="legend">
      <li><span class="legend-icon">←&nbsp;→</span> Go back / forward</li>
      <li><span class="legend-icon">⧉</span> Copy the page link</li>
      <li><span class="legend-icon">★</span> Bookmark the previewed page</li>
      <li><span class="legend-icon">↗</span> Expand into a full tab</li>
      <li><span class="legend-icon">Esc</span> Close the preview</li>
    </ul>

    <script src="popup.js"></script>
  </body>
</html>
